<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Applied to incoming streaming spans */
        .chunk-fade {
            display: inline;
            animation: fadeInUp 0.3s ease-out forwards;
        }

        /* Markdown Styling for Bot Responses */
        .markdown-body ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 1rem; }
        .markdown-body strong { font-weight: bold; color: #ea580c; } 
        .markdown-body p { margin-bottom: 0.75rem; }
        .markdown-body h3 { font-size: 1.125rem; font-weight: bold; margin-top: 1rem; margin-bottom: 0.5rem; }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <header class="bg-orange-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-tight">BITE BYTE AI</h1>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="flex justify-start">
            <div class="bg-white text-gray-800 p-3 rounded-lg shadow-sm max-w-[85%] border border-gray-200">
                <p class="text-sm">Welcome to <strong>BITE BYTE</strong>! 🍔 I can suggest spicy dishes, share recipes, or help with your order. What are you craving?</p>
            </div>
        </div>
    </main>

    <div class="px-4 py-2 flex gap-2 overflow-x-auto no-scrollbar bg-gray-100">
        <button onclick="sendQuickAction('Suggest some spicy food')" class="text-xs bg-white border border-orange-200 text-orange-600 px-3 py-2 rounded-full whitespace-nowrap hover:bg-orange-50 transition shadow-sm">🔥 Spicy Options</button>
        <button onclick="sendQuickAction('How to make Paneer Tikka?')" class="text-xs bg-white border border-orange-200 text-orange-600 px-3 py-2 rounded-full whitespace-nowrap hover:bg-orange-50 transition shadow-sm">👩‍🍳 Quick Recipe</button>
        <button onclick="sendQuickAction('Show me the menu')" class="text-xs bg-white border border-orange-200 text-orange-600 px-3 py-2 rounded-full whitespace-nowrap hover:bg-orange-50 transition shadow-sm">📋 Full Menu</button>
    </div>

    <footer class="p-4 bg-white border-t shadow-inner">
        <form id="chat-form" class="flex gap-2 max-w-4xl mx-auto">
            <button type="button" id="voice-btn" class="bg-gray-100 text-gray-600 p-3 rounded-xl hover:bg-orange-100 transition flex items-center justify-center border border-gray-200">
                <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>
            </button>
            
            <input 
                type="text" 
                id="user-input" 
                placeholder="Ask BITE BYTE..." 
                class="flex-1 border border-gray-300 rounded-xl px-4 py-2 focus:outline-none focus:ring-2 focus:ring-orange-500 transition-all"
                required
            >
            
            <button type="submit" class="bg-orange-600 text-white px-5 py-2 rounded-xl hover:bg-orange-700 transition font-medium shadow-md">
                Send
            </button>
        </form>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const voiceBtn = document.getElementById('voice-btn');

        let sessionId = localStorage.getItem('chat_session_id') || null;

        // --- Helper Functions ---

        function sendQuickAction(text) {
            userInput.value = text;
            chatForm.dispatchEvent(new Event('submit'));
        }

        function appendMessage(role) {
            const div = document.createElement('div');
            div.className = role === 'user' ? 'flex justify-end' : 'flex justify-start';
            
            const innerDiv = document.createElement('div');
            innerDiv.className = role === 'user' 
                ? 'bg-orange-600 text-white p-3 rounded-2xl rounded-tr-none shadow-sm max-w-[85%]' 
                : 'bg-white text-gray-800 p-3 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] border border-gray-200 markdown-body';
            
            div.appendChild(innerDiv);
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            return innerDiv;
        }

        // --- Voice Interface (Web Speech API) ---

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-IN'; 
            recognition.interimResults = false;

            voiceBtn.addEventListener('click', () => {
                recognition.start();
                voiceBtn.classList.add('bg-red-500', 'text-white', 'animate-pulse');
            });

            recognition.onresult = (event) => {
                userInput.value = event.results[0][0].transcript;
                resetMicButton();
            };

            recognition.onspeechend = () => { recognition.stop(); resetMicButton(); };
            recognition.onerror = () => { resetMicButton(); };

            function resetMicButton() {
                voiceBtn.classList.remove('bg-red-500', 'text-white', 'animate-pulse');
            }
        } else {
            voiceBtn.style.display = 'none';
        }

        // --- Main Chat & Streaming Logic ---

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value;
            if (!message) return;

            // Add user message to UI
            const userDiv = appendMessage('user');
            userDiv.innerText = message;
            userInput.value = '';

            // Show Loader
            const loader = document.createElement('div');
            loader.className = 'text-xs text-gray-400 italic animate-pulse p-2';
            loader.innerText = 'BITE BYTE is thinking...';
            chatWindow.appendChild(loader);

            // Prepare bot container
            const botDiv = appendMessage('bot');
            let fullMarkdownText = ""; 
            let firstChunk = true;
            
            try {
                const response = await fetch('/chat/stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message, session_id: sessionId })
                });
                
                 // Capture the session ID if it's new
                const serverSessionId = response.headers.get('X-Session-ID');
                if (serverSessionId && !sessionId) {
                    sessionId = serverSessionId;
                    localStorage.setItem('chat_session_id', sessionId); // Now it's saved for refresh!
                }
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    if (firstChunk) {
                        loader.remove();
                        firstChunk = false;
                    }

                    const chunk = decoder.decode(value, { stream: true });
                    fullMarkdownText += chunk;
                    
                    // Render current state of markdown
                    botDiv.innerHTML = marked.parse(fullMarkdownText);
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }

            } catch (error) {
                if (loader) loader.remove();
                botDiv.innerText = "Connection lost. Please check your internet.";
            }

           
        });


        async function loadHistory() {
            if (!sessionId) return; // Don't fetch if it's a brand new user

            try {
                const response = await fetch(`chat/history/${sessionId}`);
                if (!response.ok) return;
                
                const history = await response.json();
                
                // Loop through the history and append to the chat window
                history.forEach(msg => {
                    const botDiv = appendMessage(msg.role === 'user' ? 'user' : 'bot');
                    
                    if (msg.role === 'model' || msg.role === 'assistant') {
                        // Use marked to render the saved markdown correctly
                        botDiv.innerHTML = marked.parse(msg.content);
                    } else {
                        botDiv.innerText = msg.content;
                    }
                });
            } catch (err) {
                console.error("Could not load chat history:", err);
            }
     }
    
     // Trigger history load as soon as the DOM is ready
    window.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
